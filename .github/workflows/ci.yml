name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Engine unit tests (extractors / case_package / evaluation)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install triage-engine + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e services/triage-worker
          pip install pytest

      - name: Run engine unit tests
        run: pytest tests/unit -v

  api-tests:
    name: API unit tests (security / auth / services)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install soc-api (pulls triage-engine via path dep)
        run: |
          python -m pip install --upgrade pip
          pip install -e services/triage-worker
          pip install -e apps/api
          pip install pytest

      - name: Run API unit tests
        run: pytest apps/api/tests -v
